<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1A1140"/>
      <stop offset="55%" stop-color="#0C0A1C"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </radialGradient>
    <linearGradient id="head" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Logo -->
  <g transform="translate(80,70)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="#6366F1"/>
    <path d="M12 42 L22 30 L30 34 L38 22 L46 14" stroke="#0A0A0C" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

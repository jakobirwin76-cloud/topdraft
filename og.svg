    <text x="74" y="40" font-family="Arial Black, Impact, sans-serif" font-size="34" font-weight="900" fill="#FFFFFF" letter-spacing="-1">Topdraft</text>
  </g>

  <!-- Headline -->
  <text x="80" y="300" font-family="Arial Black, Impact, sans-serif" font-size="104" font-weight="900" fill="url(#head)" letter-spacing="-3">Stop being right</text>
  <text x="80" y="410" font-family="Arial Black, Impact, sans-serif" font-size="104" font-weight="900" fill="url(#head)" letter-spacing="-3">for free.</text>

  <!-- Sub -->
  <text x="84" y="478" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#A1A1AA">Trade athletes like stocks. Live, on every play. Free to play · 18+</text>


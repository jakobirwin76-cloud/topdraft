    <text x="66" y="28" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">P. Mahomes</text>
    <text x="66" y="48" font-family="monospace" font-size="14" fill="#A1A1AA">$478.61</text>

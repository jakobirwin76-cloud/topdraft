<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>You're in — Topdraft</title>
  <meta name="description" content="Welcome to Topdraft. Your position is locked." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='2' y='2' width='28' height='28' rx='4' fill='%236366F1'/%3E%3Cpath d='M7 23 L12 17 L16 19 L20 13 L25 8' stroke='%230A0A0C' stroke-width='1.9' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='25' cy='8' r='1.7' fill='%230A0A0C'/%3E%3C/svg%3E" />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />

  <style>
    @font-face {
      font-family: "Nineties Headliner";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url("fonts/NinetiesHeadliner-Regular.ttf") format("truetype");
    }

    :root {
      --bg: #0A0A0C;
      --text: #FFFFFF;
      --text-mute: #A1A1AA;
      --text-dim: #52525B;
      --accent: #6366F1;
      --accent-2: #818CF8;
      --win: #22C55E;
      --border: rgba(255,255,255,0.08);
      --font-display: "Bricolage Grotesque", sans-serif;
      --font-cyber: "Nineties Headliner", "Impact", sans-serif;
      --font-body: "Inter", sans-serif;
      --font-data: "JetBrains Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body {
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #0F0820 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 50% 100%, #1A0820 0%, transparent 65%),
        linear-gradient(180deg, #08081A 0%, #050508 50%, #0E0518 100%);
      background-attachment: fixed;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed; inset: -10%;
      background:
        radial-gradient(ellipse 100% 55% at 50% -5%, rgba(99,102,241,0.55), transparent 65%),
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(34,197,94,0.15), transparent 70%);
      filter: blur(70px);
      pointer-events: none; z-index: -2;
      animation: drift 32s ease-in-out infinite;
    }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(0,-1%) scale(1.03); }
    }
    @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }

    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 5rem 1.5rem;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 4rem;
    }
    .logo svg { color: var(--accent); }
    .logo span {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(34,197,94,0.10);
      border: 1px solid rgba(34,197,94,0.30);
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--win);
      margin-bottom: 2.5rem;
    }
    .badge svg { width: 14px; height: 14px; }

    .pos-label {
      font-family: var(--font-data);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-mute);
      margin-bottom: 0.5rem;
    }
    .pos {
      font-family: var(--font-cyber);
      font-weight: 400;
      font-size: clamp(5rem, 18vw, 9rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #6366F1 0%, #A855F7 40%, #D946EF 70%, #22D3EE 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      font-variant-numeric: tabular-nums;
    }
    .msg {
      color: var(--text-mute);
      font-size: 1.0625rem;
      line-height: 1.6;
      max-width: 30rem;
      margin: 0 auto 3rem;
    }
    .msg strong { color: var(--text); font-weight: 500; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.875rem;
      letter-spacing: 0.02em;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }
    .btn:hover { background: rgba(255,255,255,0.08); }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .footnote {
      font-family: var(--font-data);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-top: 4rem;
    }
    .footnote a { color: inherit; text-decoration: underline; }

    .already {
      display: none;
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      font-family: var(--font-data);
      font-size: 0.75rem;
      color: var(--text-mute);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }
    .already.show { display: block; }
  </style>
</head>
<body>
  <main>
    <a href="/" class="logo" aria-label="Topdraft home">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="28" height="28" rx="4" fill="currentColor"/>
        <path d="M7 23 L12 17 L16 19 L20 13 L25 8" stroke="#0A0A0C" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="25" cy="8" r="1.7" fill="#0A0A0C"/>
      </svg>
      <span>Topdraft</span>
    </a>

    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
      You're in
    </div>

    <div class="pos-label">Your position</div>
    <div class="pos" id="pos">#0</div>

    <p class="msg">
      Email <strong>confirmed</strong>. Your spot is locked.
      We'll email you the moment the doors open.
      <br/><br/>
      Top 1,000 = <strong>permanent Founder badge</strong>.
    </p>

    <div class="actions">
      <button class="btn primary" type="button" id="share-x">Share on X</button>
      <button class="btn" type="button" id="copy">Copy link</button>
      <a class="btn" href="/">Back to home</a>
    </div>

    <div class="already" id="already">
      You'd already confirmed this email earlier. Position above is your original spot.
    </div>

    <div class="footnote">
      Topdraft · Skill-based fantasy · 18+ · <a href="/">topdraft</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const position = parseInt(params.get("position") || "0", 10);
    const already = params.get("already") === "1";

    document.getElementById("pos").textContent = "#" + position.toLocaleString();
    if (already) document.getElementById("already").classList.add("show");

    // Share on X
    document.getElementById("share-x").addEventListener("click", () => {
      const text = `I'm #${position.toLocaleString()} on the Topdraft waitlist. Trading athletes like stocks.`;
      const url = location.origin;
      window.open(
        `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
        "_blank",
        "noopener,noreferrer"
      );
    });

    // Copy link
    const copyBtn = document.getElementById("copy");
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(location.origin).then(() => {
        copyBtn.textContent = "Copied";
        setTimeout(() => (copyBtn.textContent = "Copy link"), 1500);
      });
    });
  </script>
</body>
</html>
